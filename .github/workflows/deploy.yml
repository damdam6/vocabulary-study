name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # 연속 머지 시 이전 커밋 배포를 취소해 최신 커밋만 배포 (순서 역전 방지)
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # vite 빌드가 dist/ 결과물과 배포 설정 리다이렉트를 생성해야 wrangler deploy가 동작함
      - run: npm run build

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
