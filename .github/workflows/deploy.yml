name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # 연속 머지 시 이전 커밋 배포를 취소해 최신 커밋만 배포 (순서 역전 방지)
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # vite 빌드가 dist/ 결과물과 배포 설정 리다이렉트를 생성해야 wrangler deploy가 동작함
      - run: npm run build

      - uses: cloudflare/wrangler-action@v3
        id: deploy
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # 정적 자산(200)과 Worker 코드·인증 미들웨어(미인증 /api/* → 401)가 모두 살아있는지 확인
      - name: Smoke test
        run: |
          URL="${{ steps.deploy.outputs.deployment-url }}"
          test -n "$URL"
          curl -sf --retry 3 --retry-delay 5 "$URL" -o /dev/null
          test "$(curl -s --retry 3 --retry-delay 5 -o /dev/null -w '%{http_code}' "$URL/api/words")" = "401"
